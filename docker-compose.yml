services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: dayagent-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped
  influxdb:
    image: influxdb:2.7
    container_name: dayagent-influxdb
    environment:
        DOCKER_INFLUXDB_INIT_MODE: setup
        DOCKER_INFLUXDB_INIT_USERNAME: admin
        DOCKER_INFLUXDB_INIT_PASSWORD: dayagent123
        DOCKER_INFLUXDB_INIT_ORG: dayagent
        DOCKER_INFLUXDB_INIT_BUCKET: sensors
        DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dayagent-dev-token
    ports:
        - "127.0.0.1:8086:8086"
    volumes:
        - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped
  mysql:
    image: mysql:8.0
    container_name: dayagent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-dayagent}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  business-service:
    build: ./business-service
    container_name: dayagent-business
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  agent-service:
    build: ./agent_service
    container_name: dayagent-agent
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dayagent-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - business-service
      - agent-service
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  mosquitto_data:
    driver: local
  influxdb_data:
    driver: local
