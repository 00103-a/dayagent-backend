services:
  mysql:
    image: mysql:8.0
    container_name: dayagent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-dayagent}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  business-service:
    build: ./business-service
    container_name: dayagent-business
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  agent-service:
    build: ./agent_service
    container_name: dayagent-agent
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dayagent-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - business-service
      - agent-service
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
