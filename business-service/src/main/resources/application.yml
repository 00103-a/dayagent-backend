server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/dayagent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:114514}
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发时打印 SQL
    map-underscore-to-camel-case: true  # 数据库下划线 → Java 驼峰

# JWT
jwt:
  secret: ${JWT_SECRET:dayagent-dev-secret-key-change-in-production}
  expiration: 86400000  # 24小时，单位毫秒

# Python Agent 服务地址
agent:
  base-url: ${AGENT_BASE_URL:http://localhost:8000}

# MQTT
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:dayagent-spring}
  topics: dayagent/+/sensor/environment

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_TOKEN:dayagent-dev-token}
  org: ${INFLUXDB_ORG:dayagent}
  bucket: ${INFLUXDB_BUCKET:sensors}
